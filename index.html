<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f172a">
<title>Upstate NY Family Foliage 2026</title>
<!-- Leaflet — primary CDN (jsDelivr is faster/more reliable on mobile than unpkg) -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.css"/>
<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.js"></script>
<style>
  :root {
    --nj: #D97706;
    --adirondacks: #059669;
    --lake-george: #0284C7;
    --finger-lakes: #7C3AED;
    --hudson: #DC2626;
    --bg: #0f172a;
    --card: #1e293b;
    --card2: #334155;
    --text: #f1f5f9;
    --muted: #94a3b8;
    --border: #475569;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); -webkit-text-size-adjust: 100%; }
  /* safe-area insets for iPhone notch / Dynamic Island / home bar */
  nav { padding-left: max(8px, env(safe-area-inset-left)); padding-right: max(8px, env(safe-area-inset-right)); }
  footer { padding-bottom: max(24px, env(safe-area-inset-bottom)); }

  /* ── NAV ── */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
    background: rgba(15,23,42,0.95); backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 0; overflow-x: auto;
    padding: 0 8px; height: 48px;
    -webkit-overflow-scrolling: touch;   /* smooth momentum scroll on iOS */
    overscroll-behavior-x: contain;      /* prevent page bounce while swiping nav */
    scrollbar-width: none;               /* hide scrollbar on Firefox */
  }
  nav::-webkit-scrollbar { display: none; } /* hide scrollbar on WebKit */
  nav a {
    color: var(--muted); text-decoration: none; font-size: 12px; font-weight: 600;
    padding: 8px 10px; border-radius: 6px; white-space: nowrap;
    transition: color .2s, background .2s; flex-shrink: 0;
    -webkit-tap-highlight-color: transparent; /* remove blue flash on iOS tap */
    min-height: 44px; display: flex; align-items: center; /* 44px Apple tap target minimum */
  }
  nav a:hover, nav a.active { color: #fff; background: rgba(255,255,255,0.1); }
  nav a.nj { border-bottom: 2px solid var(--nj); }
  nav a.adk { border-bottom: 2px solid var(--adirondacks); }
  nav a.lg { border-bottom: 2px solid var(--lake-george); }
  nav a.fl { border-bottom: 2px solid var(--finger-lakes); }
  nav a.hv { border-bottom: 2px solid var(--hudson); }

  /* ── LAYOUT ── */
  .page { padding-top: 48px; display: flex; flex-direction: column; min-height: 100vh; }

  /* ── MAP SECTION ── */
  #map-section {
    position: relative; width: 100%;
    height: calc(100vh - 48px);          /* fallback for older browsers */
    height: calc(100dvh - 48px);         /* iOS Safari dynamic viewport — excludes browser chrome */
    min-height: 400px;
  }
  #map { width: 100%; height: 100%; }

  /* map legend */
  .map-legend {
    position: absolute; bottom: 72px; left: 12px; z-index: 900;
    background: rgba(15,23,42,0.88); backdrop-filter: blur(6px);
    border: 1px solid var(--border); border-radius: 10px;
    padding: 10px 14px; font-size: 11px; line-height: 1.8;
    max-width: calc(50vw - 20px); /* keep it from touching the scroll hint on phones */
  }
  .map-legend h4 { color: var(--muted); font-size: 10px; text-transform: uppercase; letter-spacing: .08em; margin-bottom: 4px; }
  .leg-row { display: flex; align-items: center; gap: 6px; }
  .leg-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .leg-star { font-size: 12px; }

  /* scroll hint */
  .scroll-hint {
    position: absolute; bottom: 24px; left: 12px; right: 12px; z-index: 900; /* full-width on mobile */
    background: rgba(15,23,42,0.88); border: 1px solid var(--border); border-radius: 8px;
    padding: 10px 14px; font-size: 13px; color: var(--muted);
    display: flex; align-items: center; justify-content: center; gap: 6px; cursor: pointer;
    animation: bounce 2s infinite;
    -webkit-tap-highlight-color: transparent;
  }
  @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(4px)} }

  /* on wider screens restore the old side-by-side layout */
  @media (min-width: 480px) {
    .map-legend { bottom: 24px; max-width: none; }
    .scroll-hint { left: auto; width: auto; right: 12px; justify-content: flex-start; }
  }

  /* ── ITINERARY SECTION ── */
  #itinerary { padding: 32px 16px 64px; max-width: 760px; margin: 0 auto; }

  .region-header {
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    padding: 24px 0 12px; border-bottom: 2px solid; margin-bottom: 16px;
  }
  .region-header h2 { font-size: 20px; font-weight: 700; }
  .region-header .dates { font-size: 13px; color: var(--muted); margin-left: auto; }
  .region-header .wx-chip { font-size: 12px; color: var(--muted); white-space: nowrap; }

  /* Day card */
  .day-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    margin-bottom: 10px; overflow: hidden;
  }
  .day-card-header {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 16px; cursor: pointer; user-select: none;
    -webkit-tap-highlight-color: transparent;
    min-height: 52px; /* comfortable tap target on phones */
  }
  .day-card-header:hover { background: rgba(255,255,255,0.04); }
  .day-num {
    font-size: 11px; font-weight: 700; text-transform: uppercase;
    letter-spacing: .06em; color: var(--muted); min-width: 36px;
  }
  .day-title { font-size: 15px; font-weight: 600; flex: 1; }
  .day-badge {
    font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 99px;
    text-transform: uppercase; letter-spacing: .05em;
  }
  .badge-drive { background: rgba(99,102,241,0.2); color: #a5b4fc; }
  .badge-explore { background: rgba(16,185,129,0.2); color: #6ee7b7; }
  .badge-hike { background: rgba(245,158,11,0.2); color: #fcd34d; }
  .badge-flex { background: rgba(100,116,139,0.2); color: #cbd5e1; }
  .chevron { transition: transform .25s; color: var(--muted); font-size: 14px; }
  .day-card.open .chevron { transform: rotate(180deg); }

  .day-card-body {
    max-height: 0; overflow: hidden;
    transition: max-height .35s ease;
    padding: 0 16px;
  }
  .day-card.open .day-card-body { max-height: 1800px; }
  .day-card-body-inner { padding: 0 0 16px; border-top: 1px solid var(--border); }

  .activity { display: flex; gap: 10px; padding: 10px 0; border-bottom: 1px solid rgba(71,85,105,0.4); }
  .activity:last-child { border-bottom: none; }
  .activity-icon { font-size: 18px; line-height: 1.2; width: 24px; text-align: center; flex-shrink: 0; }
  .activity-text { font-size: 13px; line-height: 1.5; color: var(--text); }
  .activity-text strong { color: #e2e8f0; }
  .activity-text .sub { color: var(--muted); font-size: 12px; margin-top: 2px; }
  .optional-tag { font-size: 10px; color: #fbbf24; background: rgba(251,191,36,0.15); padding: 1px 5px; border-radius: 4px; margin-left: 4px; }

  /* drive bar */
  .drive-bar {
    margin: 8px 0; padding: 8px 12px; border-radius: 8px;
    background: rgba(99,102,241,0.12); border: 1px solid rgba(99,102,241,0.25);
    display: flex; align-items: center; gap: 10px; font-size: 12px; color: #a5b4fc;
  }

  /* hike tabs */
  .hike-tabs { margin: 12px 0 0; }
  .hike-tab-btns { display: flex; gap: 6px; margin-bottom: 8px; flex-wrap: wrap; }
  .htab {
    padding: 8px 14px; border-radius: 6px; font-size: 12px; font-weight: 600;
    border: 1px solid var(--border); background: transparent; color: var(--muted);
    cursor: pointer; transition: .2s;
    -webkit-tap-highlight-color: transparent;
    min-height: 44px; /* Apple tap target */
  }
  .htab.active { background: var(--card2); color: var(--text); border-color: var(--muted); }
  .hike-option { display: none; font-size: 13px; padding: 10px; background: var(--card2); border-radius: 8px; }
  .hike-option.active { display: block; }
  .hike-option p { margin-bottom: 6px; }
  .hike-option .trail-stat { display: inline-block; background: rgba(0,0,0,0.3); border-radius: 4px; padding: 2px 7px; font-size: 11px; margin: 2px 2px 0 0; color: var(--muted); }

  /* AllTrails link button */
  .trail-link {
    display: inline-flex; align-items: center; gap: 5px;
    margin-top: 10px; padding: 6px 12px; border-radius: 6px;
    background: rgba(5,150,105,0.15); border: 1px solid rgba(5,150,105,0.35);
    color: #6ee7b7; font-size: 11px; font-weight: 700; text-decoration: none;
    letter-spacing: .03em; transition: background .2s, border-color .2s;
    -webkit-tap-highlight-color: transparent;
  }
  .trail-link:hover { background: rgba(5,150,105,0.25); border-color: rgba(5,150,105,0.55); }
  .trail-link svg { width: 13px; height: 13px; fill: currentColor; flex-shrink: 0; }

  /* ── REGION INFO CARDS (eat / skip-hike tabs) ── */
  .region-info-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    margin-bottom: 14px; overflow: hidden;
  }
  .ri-tabs { display: flex; border-bottom: 1px solid var(--border); }
  .ri-tab {
    flex: 1; padding: 10px 8px; font-size: 13px; font-weight: 600; text-align: center;
    border: none; background: transparent; color: var(--muted); cursor: pointer;
    border-bottom: 2px solid transparent; margin-bottom: -1px;
    transition: color .2s, border-color .2s; -webkit-tap-highlight-color: transparent; min-height: 44px;
  }
  .ri-tab.active { color: var(--text); border-bottom-color: #e2e8f0; }
  .ri-panel { display: none; padding: 10px 16px 14px; }
  .ri-panel.active { display: block; }
  .ri-item { display: flex; gap: 10px; padding: 8px 0; border-bottom: 1px solid rgba(71,85,105,0.28); }
  .ri-item:last-child { border-bottom: none; }
  .ri-icon { font-size: 16px; width: 22px; flex-shrink: 0; text-align: center; margin-top: 1px; }
  .ri-text { font-size: 13px; line-height: 1.45; }
  .ri-text strong { color: #e2e8f0; }
  .ri-sub { color: var(--muted); font-size: 11px; margin-top: 2px; line-height: 1.4; }
  .ri-badge { display: inline-block; font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 99px; margin-left: 4px; vertical-align: middle; }
  .rb-casual { background: rgba(16,185,129,0.15);  color: #6ee7b7; }
  .rb-fine   { background: rgba(99,102,241,0.15);  color: #a5b4fc; }
  .rb-brew   { background: rgba(245,158,11,0.15);  color: #fcd34d; }
  .rb-wine   { background: rgba(220,38,38,0.15);   color: #fca5a5; }
  .rb-must   { background: rgba(6,182,212,0.15);   color: #67e8f9; }

  /* ── RESOURCES (trip operations center) ── */
  #logistics { max-width: 760px; margin: 0 auto; padding: 0 16px 64px; }
  .res-legend { font-size: 11px; color: var(--muted); display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 14px; }
  .res-legend-item { display: flex; align-items: center; gap: 4px; }
  .res-section { background: var(--card); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 14px; overflow: hidden; }
  .res-section-header { display: flex; align-items: center; gap: 10px; padding: 12px 16px 10px; border-bottom: 1px solid var(--border); }
  .res-section-header h3 { font-size: 14px; font-weight: 700; flex: 1; }
  .res-intro { font-size: 12px; color: var(--muted); padding: 10px 16px 8px; line-height: 1.5; border-bottom: 1px solid rgba(71,85,105,0.3); }
  .res-item { display: flex; align-items: center; gap: 10px; padding: 9px 16px; border-bottom: 1px solid rgba(71,85,105,0.22); }
  .res-item:last-child { border-bottom: none; }
  .res-item-left { display: flex; align-items: flex-start; gap: 8px; flex: 1; min-width: 0; }
  .res-item-label { font-size: 13px; line-height: 1.4; }
  .res-item-sub { font-size: 11px; color: var(--muted); margin-top: 3px; }
  .res-item-right { display: flex; align-items: center; gap: 6px; flex-shrink: 0; flex-wrap: wrap; justify-content: flex-end; }
  /* Priority dot */
  .pri-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }
  .pri-critical    { background: #ef4444; }
  .pri-recommended { background: #f59e0b; }
  .pri-optional    { background: #475569; }
  /* Status chip — click to cycle pending → reserved → done */
  .status-chip { font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 99px; cursor: pointer; border: none; white-space: nowrap; transition: background .15s, color .15s; -webkit-tap-highlight-color: transparent; min-height: 26px; display: inline-flex; align-items: center; }
  .status-pending  { background: rgba(100,116,139,0.2); color: #94a3b8; }
  .status-reserved { background: rgba(245,158,11,0.2);  color: #fcd34d; }
  .status-done     { background: rgba(16,185,129,0.2);  color: #6ee7b7; }
  /* Action buttons */
  .res-btn { font-size: 10px; font-weight: 700; padding: 3px 9px; border-radius: 6px; text-decoration: none; white-space: nowrap; transition: background .15s; -webkit-tap-highlight-color: transparent; display: inline-flex; align-items: center; gap: 3px; border: 1px solid; min-height: 26px; }
  .res-btn-booking { background: rgba(5,150,105,0.15);  border-color: rgba(5,150,105,0.4);  color: #6ee7b7; }
  .res-btn-booking:hover { background: rgba(5,150,105,0.28); }
  .res-btn-info    { background: rgba(99,102,241,0.15); border-color: rgba(99,102,241,0.4); color: #a5b4fc; }
  .res-btn-info:hover { background: rgba(99,102,241,0.28); }
  .res-btn-map     { background: rgba(6,182,212,0.15);  border-color: rgba(6,182,212,0.4);  color: #67e8f9; }
  .res-btn-map:hover { background: rgba(6,182,212,0.28); }
  .res-btn-weather { background: rgba(59,130,246,0.15); border-color: rgba(59,130,246,0.4); color: #93c5fd; }
  .res-btn-weather:hover { background: rgba(59,130,246,0.28); }
  .res-btn-guide   { background: rgba(100,116,139,0.15); border-color: rgba(100,116,139,0.4); color: #94a3b8; }
  .res-btn-guide:hover { background: rgba(100,116,139,0.28); }

  /* ── FOOTER ── */
  footer { text-align: center; padding: 24px; font-size: 11px; color: var(--muted); border-top: 1px solid var(--border); }

  /* ── CUSTOM MAP MARKERS ── */
  .marker-main {
    width: 34px; height: 34px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px; font-weight: 800;
    border: 3px solid rgba(255,255,255,0.9);
    box-shadow: 0 2px 8px rgba(0,0,0,0.5);
  }
  .marker-opt {
    width: 24px; height: 24px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px;
    border: 2px solid rgba(255,255,255,0.7);
    box-shadow: 0 2px 6px rgba(0,0,0,0.4);
    background: #334155;
    color: #e2e8f0;
  }

  /* ── SHARED: action buttons & inline code ── */
  .nav-btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 9px 13px; border-radius: 8px; font-size: 12px; font-weight: 700;
    text-decoration: none; border: 1px solid var(--border); background: var(--card2); color: var(--text);
    -webkit-tap-highlight-color: transparent; min-height: 40px; cursor: pointer;
    transition: background .2s, border-color .2s; white-space: nowrap;
  }
  .nav-btn:hover { background: #3f4d63; }
  .nav-btn.primary { background: rgba(37,99,235,0.18); border-color: rgba(37,99,235,0.45); color: #bfdbfe; }
  .nav-btn.primary:hover { background: rgba(37,99,235,0.3); }
  .nav-btn.maps { background: rgba(16,185,129,0.15); border-color: rgba(16,185,129,0.4); color: #86efac; }
  .nav-btn.maps:hover { background: rgba(16,185,129,0.28); }
  code { background: rgba(0,0,0,0.3); padding: 1px 5px; border-radius: 4px; font-size: 12px; }

  /* ── TODAY / CONTROL CENTER ── */
  #today { max-width: 760px; margin: 0 auto; padding: 20px 16px 4px; }
  .today-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 16px 16px 18px; }
  .today-eyebrow { font-size: 11px; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); font-weight: 700; }
  .today-headline { font-size: 20px; font-weight: 800; margin: 5px 0 3px; line-height: 1.25; }
  .today-sub { font-size: 13px; color: var(--muted); line-height: 1.5; }
  .today-actions { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 14px; }

  /* ── WEATHER ── */
  .wx-card { margin-top: 14px; background: var(--card2); border: 1px solid var(--border); border-radius: 12px; padding: 12px 14px; }
  .wx-loading, .wx-error { font-size: 12px; color: var(--muted); line-height: 1.5; }
  .wx-error a { color: #7dd3fc; }
  .wx-place { font-size: 11px; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); font-weight: 700; margin-bottom: 9px; }
  .wx-now { display: flex; align-items: center; gap: 12px; }
  .wx-icon { font-size: 30px; line-height: 1; }
  .wx-temp { font-size: 26px; font-weight: 800; line-height: 1.1; }
  .wx-meta { font-size: 12px; color: var(--muted); line-height: 1.5; }
  .wx-days { display: flex; gap: 8px; margin-top: 12px; }
  .wx-day { flex: 1; text-align: center; background: rgba(0,0,0,0.22); border-radius: 8px; padding: 8px 4px; }
  .wx-day .d { font-size: 10px; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); font-weight: 700; }
  .wx-day .i { font-size: 18px; margin: 3px 0; }
  .wx-day .t { font-size: 12px; font-weight: 700; }
  .wx-day .t .lo { color: var(--muted); font-weight: 500; }
  .wx-day .p { font-size: 10px; color: #7dd3fc; margin-top: 2px; }
  .wx-warn { margin-top: 10px; font-size: 12px; padding: 7px 10px; border-radius: 7px; line-height: 1.5;
             background: rgba(245,158,11,0.14); border: 1px solid rgba(245,158,11,0.3); color: #fcd34d; }
  .wx-source { font-size: 10px; color: var(--muted); margin-top: 8px; }
  .wx-source a { color: var(--muted); }

  /* ── DRIVE BAR ── */
  .drive-bar { flex-wrap: wrap; }
  .drive-bar .drive-text { flex: 1; min-width: 60%; }
  .drive-bar .nav-btn { margin-left: auto; }

  /* ── TRIP MAP (Google My Maps) ── */
  #trip-map { max-width: 760px; margin: 0 auto; padding: 20px 16px 0; }
  .tripmap-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 16px; }
  .tripmap-card h3 { font-size: 14px; font-weight: 700; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
  .tripmap-card p { font-size: 13px; color: var(--muted); line-height: 1.6; margin-bottom: 12px; }
  .tripmap-embed { width: 100%; aspect-ratio: 16 / 10; border: 0; border-radius: 10px; display: block; }
</style>
<script src="trip-data.js"></script>
</head>
<body>

<!-- NAV -->
<nav>
  <a href="#today">📅 Today</a>
  <a href="#map-section">🗺 Map</a>
  <a href="#trip-map">🧭 My Map</a>
  <a href="#nj" class="nj">NJ</a>
  <a href="#adirondacks" class="adk">Adirondacks</a>
  <a href="#lake-george" class="lg">Lake George</a>
  <a href="#finger-lakes" class="fl">Finger Lakes</a>
  <a href="#hudson" class="hv">Hudson Valley</a>
  <a href="#logistics">✅ Ops Center</a>
</nav>

<div class="page">

<!-- ═══════════════ TODAY / CONTROL CENTER ═══════════════ -->
<section id="today"></section>

<!-- ═══════════════ MAP ═══════════════ -->
<section id="map-section">
  <div id="map"></div>
  <div class="map-legend">
    <h4>Legend</h4>
    <div class="leg-row"><div class="leg-dot" style="background:var(--nj)"></div> NJ / EWR</div>
    <div class="leg-row"><div class="leg-dot" style="background:var(--adirondacks)"></div> Adirondacks</div>
    <div class="leg-row"><div class="leg-dot" style="background:var(--lake-george)"></div> Lake George</div>
    <div class="leg-row"><div class="leg-dot" style="background:var(--finger-lakes)"></div> Finger Lakes</div>
    <div class="leg-row"><div class="leg-dot" style="background:var(--hudson)"></div> Hudson Valley</div>
    <div class="leg-row"><div class="leg-dot" style="background:#64748b"></div> Activity stop</div>
  </div>
  <div class="scroll-hint" onclick="document.getElementById('itinerary').scrollIntoView({behavior:'smooth'})">
    📅 See day-by-day ↓
  </div>
</section>

<!-- ═══════════════ TRIP MAP (Google My Maps) ═══════════════ -->
<section id="trip-map"></section>

<!-- ═══════════════ ITINERARY ═══════════════ -->
<section id="itinerary"></section>

<!-- ═══════════════ LOGISTICS / CHECKLIST ═══════════════ -->
<section id="logistics"></section>

<footer>Upstate NY Family Foliage 2026 · Sep 27 – Oct 15 · Built with ❤️ for the Ofek family</footer>

</div><!-- .page -->

<script>
// ══════════════════════════════════════
// RENDERING  (reads from trip-data.js)
// ══════════════════════════════════════

const AT_SVG = `<svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>`;

function renderActivity(a) {
  const tagHtml    = a.tag      ? ` <span class="optional-tag">${a.tag}</span>` : '';
  const trailHtml  = a.trailUrl ? `<br><a class="trail-link" href="${a.trailUrl}" target="_blank" rel="noopener" style="margin-top:8px">${AT_SVG} View on AllTrails</a>` : '';
  const styleAttr  = a.style    ? ` style="${a.style}"` : '';
  return `<div class="activity"${styleAttr}>
    <div class="activity-icon">${a.icon}</div>
    <div class="activity-text">
      <strong>${a.title}</strong>${tagHtml}
      <div class="sub">${a.sub}${trailHtml}</div>
    </div>
  </div>`;
}

function renderDriveBar(d) {
  const navBtn = d.route
    ? `<a class="nav-btn maps" href="${gmapsDirUrl(d.route)}" target="_blank" rel="noopener">🧭 Navigate</a>`
    : '';
  return `<div class="drive-bar">🚗 <span class="drive-text">${d.text}</span>${navBtn}</div>`;
}

function renderHikePanel(prefix, tab) {
  const stats     = tab.stats.map(s => `<span class="trail-stat">${s}</span>`).join('');
  const separator = tab.note
    ? `<p style="margin-top:8px; font-size:12px; color:var(--muted)">${tab.note}</p>`
    : '<br>';
  const titlePara = tab.desc
    ? `<p><strong>${tab.title}</strong>${tab.desc}</p>`
    : `<p><strong>${tab.title}</strong></p>`;
  return `<div id="${prefix}-${tab.id}" class="hike-option${tab.active ? ' active' : ''}">
    ${titlePara}
    ${stats}
    ${separator}
    <a class="trail-link" href="${tab.url}" target="_blank" rel="noopener">
      ${AT_SVG}
      View on AllTrails
    </a>
  </div>`;
}

function renderHikeTabs(ht) {
  const btns   = ht.tabs.map(t =>
    `<button class="htab${t.active ? ' active' : ''}" onclick="hikeTab('${ht.prefix}','${t.id}')">${t.label}</button>`
  ).join('');
  const panels = ht.tabs.map(t => renderHikePanel(ht.prefix, t)).join('');
  return `<div class="hike-tabs">
    <div class="hike-tab-btns">${btns}</div>
    ${panels}
  </div>`;
}

function renderDay(id, day) {
  const content = day.content.map(item => {
    if (item.type === 'activity')  return renderActivity(item);
    if (item.type === 'drive')     return renderDriveBar(item);
    if (item.type === 'hiketabs')  return renderHikeTabs(item);
    return '';
  }).join('');
  return `<div class="day-card" id="${id}">
    <div class="day-card-header" onclick="toggle('${id}')">
      <span class="day-num">${day.date}</span>
      <span class="day-title">${day.title}</span>
      <span class="day-badge badge-${day.badge}">${day.badgeLabel}</span>
      <span class="chevron">▼</span>
    </div>
    <div class="day-card-body"><div class="day-card-body-inner">
      ${content}
    </div></div>
  </div>`;
}

function renderRiItem(item) {
  const badgeHtml = item.badge
    ? ` <span class="ri-badge ${item.badge}">${item.badgeLabel}</span>`
    : '';
  return `<div class="ri-item">
    <div class="ri-icon">${item.icon}</div>
    <div class="ri-text">
      <strong>${item.name}</strong>${badgeHtml}
      <div class="ri-sub">${item.sub}</div>
    </div>
  </div>`;
}

function renderInfoCard(card) {
  const eatItems    = card.eat.map(renderRiItem).join('');
  const nohikeItems = card.nohike.map(renderRiItem).join('');
  return `<div class="region-info-card">
    <div class="ri-tabs">
      <button class="ri-tab active" onclick="riTab('${card.prefix}','eat')">🍽 Where to Eat</button>
      <button class="ri-tab" onclick="riTab('${card.prefix}','nohike')">🎭 Skip the Hike?</button>
    </div>
    <div id="${card.prefix}-eat" class="ri-panel active">${eatItems}</div>
    <div id="${card.prefix}-nohike" class="ri-panel">${nohikeItems}</div>
  </div>`;
}

function renderRegion(region) {
  const wxChip = region.weather
    ? `<span class="wx-chip" id="wxchip-${region.id}">🌡️ …</span>`
    : '';
  const header = `<div id="${region.id}" class="region-header" style="border-color:var(${region.colorVar})">
    <span style="font-size:24px">${region.emoji}</span>
    <h2 style="color:var(${region.colorVar})">${region.title}</h2>
    <span class="dates">${region.dates}</span>
    ${wxChip}
  </div>`;
  const infoCard = region.infoCard ? renderInfoCard(region.infoCard) : '';
  const days     = region.days.map(id => renderDay(id, DAYS[id])).join('');
  return header + infoCard + days;
}

function renderItinerary() {
  document.getElementById('itinerary').innerHTML = REGIONS.map(renderRegion).join('');
}

const STATUS_LABELS = { pending: '⬜ Pending', reserved: '🟨 Reserved', done: '🟩 Done' };
const STATUS_CYCLE  = { pending: 'reserved', reserved: 'done', done: 'pending' };

const TYPE_BTN = {
  booking:      ['📅 Book',       'res-btn-booking'],
  info:         ['ℹ Info',        'res-btn-info'],
  'live-map':   ['🗺 Map',        'res-btn-map'],
  'live-weather':['🌤 Weather',   'res-btn-weather'],
  forecast:     ['📊 Forecast',   'res-btn-map'],
  todo:         ['↗ Guide',       'res-btn-guide'],
};

function getResBtn(item) {
  if (!item.url) return '';
  const [label, cls] = TYPE_BTN[item.type] || ['↗ Open', 'res-btn-info'];
  return `<a class="res-btn ${cls}" href="${item.url}" target="_blank" rel="noopener">${label}</a>`;
}

function renderResItem(item) {
  const priClass = `pri-${item.priority || 'optional'}`;
  const status   = item.status || 'pending';
  const subParts = [item.dates, item.notes];
  if (item.reservation_deadline) subParts.push(`⚠️ Book by ${item.reservation_deadline}`);
  const sub = subParts.filter(Boolean).join(' · ');
  return `<div class="res-item">
    <div class="res-item-left">
      <div class="pri-dot ${priClass}"></div>
      <div>
        <div class="res-item-label">${item.label}</div>
        ${sub ? `<div class="res-item-sub">${sub}</div>` : ''}
      </div>
    </div>
    <div class="res-item-right">
      ${getResBtn(item)}
      <button class="status-chip status-${status}" data-status="${status}"
        onclick="cycleStatus(this)">${STATUS_LABELS[status]}</button>
    </div>
  </div>`;
}

function renderResSection(section) {
  const intro = section.intro ? `<div class="res-intro">${section.intro}</div>` : '';
  const items = section.items.map(renderResItem).join('');
  return `<div class="res-section">
    <div class="res-section-header">
      <span style="font-size:20px">${section.icon}</span>
      <h3>${section.title}</h3>
    </div>
    ${intro}
    ${items}
  </div>`;
}

function renderResources() {
  const sections = RESOURCES.sections.map(renderResSection).join('');
  document.getElementById('logistics').innerHTML = `
    <div class="region-header" style="border-color:var(--border); padding-top:8px">
      <span style="font-size:24px">✅</span>
      <h2>Trip Operations Center</h2>
    </div>
    <div class="res-legend">
      <span class="res-legend-item"><span class="pri-dot pri-critical" style="display:inline-block"></span> Critical</span>
      <span class="res-legend-item"><span class="pri-dot pri-recommended" style="display:inline-block"></span> Recommended</span>
      <span class="res-legend-item"><span class="pri-dot pri-optional" style="display:inline-block"></span> Optional</span>
      <span style="color:#475569">· tap status chip to update</span>
    </div>
    ${sections}`;
}

// ══════════════════════════════════════
// GOOGLE MAPS LINK HELPERS
// ══════════════════════════════════════
function gmapsSearchUrl(query) {
  return 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(query);
}
function gmapsDirUrl(route) {
  const p = new URLSearchParams({ api: '1', origin: route.from, destination: route.to, travelmode: 'driving' });
  if (route.via && route.via.length) p.set('waypoints', route.via.join('|'));
  return 'https://www.google.com/maps/dir/?' + p.toString();
}

// ══════════════════════════════════════
// LIVE WEATHER (Open-Meteo — no key, CORS-enabled, free for non-commercial use)
// ══════════════════════════════════════
const WX_CODES = {
  0:['☀️','Clear sky'], 1:['🌤️','Mostly clear'], 2:['⛅','Partly cloudy'], 3:['☁️','Overcast'],
  45:['🌫️','Fog'], 48:['🌫️','Freezing fog'],
  51:['🌦️','Light drizzle'], 53:['🌦️','Drizzle'], 55:['🌧️','Heavy drizzle'],
  56:['🌧️','Freezing drizzle'], 57:['🌧️','Freezing drizzle'],
  61:['🌦️','Light rain'], 63:['🌧️','Rain'], 65:['🌧️','Heavy rain'],
  66:['🌧️','Freezing rain'], 67:['🌧️','Freezing rain'],
  71:['🌨️','Light snow'], 73:['🌨️','Snow'], 75:['❄️','Heavy snow'], 77:['🌨️','Snow grains'],
  80:['🌦️','Rain showers'], 81:['🌧️','Rain showers'], 82:['⛈️','Heavy rain showers'],
  85:['🌨️','Snow showers'], 86:['❄️','Heavy snow showers'],
  95:['⛈️','Thunderstorm'], 96:['⛈️','Thunderstorm w/ hail'], 99:['⛈️','Severe thunderstorm']
};
function wxInfo(code) { return WX_CODES[code] || ['🌡️','—']; }

function wxApiUrl(loc) {
  return `https://api.open-meteo.com/v1/forecast?latitude=${loc.lat}&longitude=${loc.lon}`
    + `&current=temperature_2m,precipitation,weather_code,wind_speed_10m`
    + `&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_probability_max`
    + `&timezone=auto&forecast_days=3&temperature_unit=fahrenheit&wind_speed_unit=mph&precipitation_unit=inch`;
}

function renderWxFull(loc, j) {
  const c = j.current, d = j.daily;
  const [emo, txt] = wxInfo(c.weather_code);
  const days = d.time.map((iso, i) => {
    const dt = new Date(iso + 'T12:00:00');
    const lbl = i === 0 ? 'Today' : dt.toLocaleDateString(undefined, { weekday: 'short' });
    const [de] = wxInfo(d.weather_code[i]);
    const pp = d.precipitation_probability_max[i];
    return `<div class="wx-day"><div class="d">${lbl}</div><div class="i">${de}</div>
      <div class="t">${Math.round(d.temperature_2m_max[i])}°<span class="lo"> / ${Math.round(d.temperature_2m_min[i])}°</span></div>
      ${pp != null ? `<div class="p">${pp}% 🌧</div>` : ''}</div>`;
  }).join('');
  const warns = [];
  const probs = d.precipitation_probability_max.filter(v => v != null);
  const pmax = probs.length ? Math.max(...probs) : 0;
  const tmin = Math.min(...d.temperature_2m_min);
  if (c.precipitation > 0) warns.push('Raining right now — bring rain covers.');
  else if (pmax >= 50) warns.push(`Up to ${pmax}% rain chance over the next few days — pack rain layers.`);
  if (tmin <= 40) warns.push(`Mornings near ${Math.round(tmin)}°F — warm layers for the kids.`);
  if (c.wind_speed_10m >= 25) warns.push(`Breezy (${Math.round(c.wind_speed_10m)} mph) — windproof jackets.`);
  const warnHtml = warns.length ? `<div class="wx-warn">⚠️ ${warns.join(' ')}</div>` : '';
  return `<div class="wx-place">Live conditions · ${loc.name}</div>
    <div class="wx-now">
      <div class="wx-icon">${emo}</div>
      <div><div class="wx-temp">${Math.round(c.temperature_2m)}°F</div>
      <div class="wx-meta">${txt} · wind ${Math.round(c.wind_speed_10m)} mph</div></div>
    </div>
    <div class="wx-days">${days}</div>
    ${warnHtml}
    <div class="wx-source">Source: <a href="https://open-meteo.com/" target="_blank" rel="noopener">Open-Meteo</a> · 3-day outlook; becomes trip-accurate within ~2 weeks of travel. Deeper forecasts in the Ops Center.</div>`;
}

async function loadWeatherInto(el, loc, opts) {
  opts = opts || {};
  if (opts.compact) { el.textContent = '🌡️ …'; }
  else { el.innerHTML = '<div class="wx-loading">Loading live weather…</div>'; }
  try {
    const r = await fetch(wxApiUrl(loc));
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const j = await r.json();
    if (opts.compact) {
      const [emo] = wxInfo(j.current.weather_code);
      el.textContent = `${emo} ${Math.round(j.current.temperature_2m)}°F now`;
      el.title = `Live conditions in ${loc.name}`;
    } else {
      el.innerHTML = renderWxFull(loc, j);
    }
  } catch (e) {
    if (opts.compact) { el.textContent = ''; }
    else {
      el.innerHTML = '<div class="wx-error">Live weather unavailable — check your connection, or open the '
        + '<a href="https://forecast.weather.gov/" target="_blank" rel="noopener">NWS forecast</a>.</div>';
    }
  }
}

// ══════════════════════════════════════
// TODAY / CONTROL-CENTER PANEL
// ══════════════════════════════════════
function sameDay(a, b) {
  return a.getFullYear() === b.getFullYear() && a.getMonth() === b.getMonth() && a.getDate() === b.getDate();
}
function buildTripDays() {
  const year = new Date(TRIP_META.startDate).getFullYear();
  const out = [];
  REGIONS.forEach(r => (r.days || []).forEach(id => {
    const day = DAYS[id];
    if (!day) return;
    const dt = new Date(`${day.date} ${year}`);
    if (!isNaN(dt)) out.push({ id, region: r, day, date: dt });
  }));
  out.sort((a, b) => a.date - b.date);
  return out;
}
function findDriveRoute(day) {
  const item = (day.content || []).find(c => c.type === 'drive' && c.route);
  return item ? item.route : null;
}

function renderToday() {
  const el = document.getElementById('today');
  const days = buildTripDays();
  const today0 = new Date(); today0.setHours(0, 0, 0, 0);
  const first = days[0].date;
  const tripEnd = new Date(TRIP_META.endDate + 'T12:00:00');

  let entry = null, eyebrow, headline, sub;
  if (today0 < new Date(first.getFullYear(), first.getMonth(), first.getDate())) {
    const n = Math.round((first - today0) / 86400000);
    entry = days[0];
    eyebrow = 'Countdown';
    headline = `${n} day${n === 1 ? '' : 's'} until the trip`;
    sub = `First leg: ${entry.day.title}. Live weather below is for ${entry.region.weather.name.split(',')[0]} right now — it becomes accurate for your dates as travel approaches.`;
  } else if (today0 > tripEnd) {
    eyebrow = 'Trip complete';
    headline = 'Welcome home 🍂';
    sub = 'Hope the foliage delivered. The dashboard stays put for the next adventure.';
  } else {
    entry = days.find(d => sameDay(d.date, today0)) || days.find(d => d.date >= today0);
    if (entry && sameDay(entry.date, today0)) {
      eyebrow = 'Today on the trip · ' + entry.date.toLocaleDateString(undefined, { weekday: 'long', month: 'short', day: 'numeric' });
      headline = entry.day.title;
      sub = `${entry.region.emoji} ${entry.region.title} · ${entry.day.badgeLabel} day`;
    } else if (entry) {
      const n = Math.round((entry.date - today0) / 86400000);
      eyebrow = 'Up next · ' + (n === 1 ? 'tomorrow' : 'in ' + n + ' days');
      headline = entry.day.title;
      sub = `${entry.region.emoji} ${entry.region.title}`;
    } else {
      entry = { region: REGIONS.find(r => r.id === 'nj'), day: { content: [] }, date: today0 };
      eyebrow = 'Wind-down in NJ';
      headline = 'Family time before the flight home';
      sub = 'NJ day-trip ideas are under the NJ section below. Live weather is for Newark right now.';
    }
  }

  const actions = [];
  if (entry) {
    const route = findDriveRoute(entry.day);
    if (route) actions.push(`<a class="nav-btn maps" href="${gmapsDirUrl(route)}" target="_blank" rel="noopener">🧭 Navigate today's drive</a>`);
    if (entry.region.weather) actions.push(`<a class="nav-btn maps" href="${gmapsSearchUrl(entry.region.weather.name)}" target="_blank" rel="noopener">📍 Open ${entry.region.weather.name.split(',')[0]} in Google Maps</a>`);
    actions.push(`<a class="nav-btn" href="#${entry.region.id}" onclick="document.getElementById('${entry.region.id}').scrollIntoView({behavior:'smooth'});return false;">📅 Day-by-day for ${entry.region.title.split(' · ')[0]}</a>`);
  }
  actions.push(`<a class="nav-btn" href="#logistics" onclick="document.getElementById('logistics').scrollIntoView({behavior:'smooth'});return false;">✅ Ops Center · foliage &amp; bookings</a>`);

  el.innerHTML = `<div class="today-card">
    <div class="today-eyebrow">${eyebrow}</div>
    <div class="today-headline">${headline}</div>
    <div class="today-sub">${sub}</div>
    <div class="today-actions">${actions.join('')}</div>
    ${entry && entry.region.weather ? `<div class="wx-card" id="wx-today"></div>` : ''}
  </div>`;

  if (entry && entry.region.weather) {
    loadWeatherInto(document.getElementById('wx-today'), entry.region.weather);
  }
}

// ══════════════════════════════════════
// TRIP MAP (Google My Maps embed, or build-your-own placeholder)
// ══════════════════════════════════════
function renderTripMap() {
  const el = document.getElementById('trip-map');
  if (TRIP_META.myMapsEmbedUrl) {
    el.innerHTML = `<div class="tripmap-card">
      <h3>🧭 Trip Map</h3>
      <iframe class="tripmap-embed" src="${TRIP_META.myMapsEmbedUrl}" loading="lazy" allowfullscreen referrerpolicy="no-referrer-when-downgrade"></iframe>
    </div>`;
  } else {
    el.innerHTML = `<div class="tripmap-card">
      <h3>🧭 Trip Map &amp; Navigation</h3>
      <p>For turn-by-turn directions, use the <strong>Navigate</strong> button on each drive day above, or the buttons in the <em>Today</em> panel. For one shared map with custom layers — hotels, food, rainy-day backups, pharmacies, scenic foliage pull-offs — build a free Google "My Maps", then paste its embed URL into <code>trip-data.js</code> → <code>TRIP_META.myMapsEmbedUrl</code> to show it right here.</p>
      <a class="nav-btn primary" href="https://www.google.com/maps/d/" target="_blank" rel="noopener">➕ Create a Google My Map</a>
    </div>`;
  }
}

// Render everything synchronously so the DOM is ready for the map observer
renderToday();
renderTripMap();
renderItinerary();
renderResources();

// Kick off live weather for each region header (compact "now" chips)
REGIONS.forEach(r => {
  if (!r.weather) return;
  const chip = document.getElementById('wxchip-' + r.id);
  if (chip) loadWeatherInto(chip, r.weather, { compact: true });
});

// ══════════════════════════════════════
// NON-MAP UTILS (work without Leaflet)
// ══════════════════════════════════════
function toggle(id) {
  document.getElementById(id).classList.toggle('open');
}

function hikeTab(prefix, tab) {
  ['base','upgrade','stretch'].forEach(t => {
    const el = document.getElementById(`${prefix}-${t}`);
    if (el) el.classList.remove('active');
  });
  const target = document.getElementById(`${prefix}-${tab}`);
  if (!target) return;
  target.classList.add('active');
  const card = target.closest('.hike-tabs');
  card.querySelectorAll('.htab').forEach(btn => {
    btn.classList.toggle('active', btn.getAttribute('onclick').includes(`'${tab}'`));
  });
}

function cycleStatus(chip) {
  const next = STATUS_CYCLE[chip.dataset.status];
  chip.dataset.status = next;
  chip.className = `status-chip status-${next}`;
  chip.textContent = STATUS_LABELS[next];
}

function riTab(region, tab) {
  ['eat','nohike'].forEach(t => {
    const el = document.getElementById(`${region}-${t}`);
    if (el) el.classList.remove('active');
  });
  const target = document.getElementById(`${region}-${tab}`);
  if (!target) return;
  target.classList.add('active');
  target.closest('.region-info-card').querySelectorAll('.ri-tab').forEach(btn => {
    btn.classList.toggle('active', btn.getAttribute('onclick').includes(`'${tab}'`));
  });
}

// ══════════════════════════════════════
// MAP — initialise only after window load
// so the Leaflet <script> is guaranteed done
// ══════════════════════════════════════
window.addEventListener('load', function () {

  if (typeof L === 'undefined') {
    // Leaflet CDN failed — show a friendly fallback inside the map div
    const mapEl = document.getElementById('map');
    mapEl.innerHTML = `
      <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;
                  height:100%;gap:12px;color:#94a3b8;font-family:-apple-system,sans-serif;padding:24px;text-align:center">
        <div style="font-size:48px">🗺️</div>
        <div style="font-size:16px;font-weight:700;color:#e2e8f0">Map needs an internet connection</div>
        <div style="font-size:13px;max-width:280px">Connect to Wi-Fi or mobile data, then reload the page to see the interactive map.</div>
      </div>`;
    return;
  }

  // ── TILE LAYER ──
  const map = L.map('map', {
    zoomControl: true,
    tap: true,          // enable tap handler on iOS
    tapTolerance: 15    // more forgiving touch on phones
  }).setView([42.8, -74.5], 7);

  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}.png', {
    attribution: '© <a href="https://www.openstreetmap.org/copyright">OSM</a> contributors © <a href="https://carto.com/">CARTO</a>',
    subdomains: 'abcd',
    maxZoom: 19,
    crossOrigin: true
  }).addTo(map);

  // Force a size recalculation in case the container dimensions weren't final at init time
  setTimeout(() => map.invalidateSize(), 200);

  // ── ROUTE & MARKERS (from trip-data.js) ──
  L.polyline(ROUTE, { color:'#1E40AF', weight:4, opacity:0.85, smoothFactor:1 }).addTo(map);

  STOPS.forEach(s => {
    const iconHtml = s.main
      ? `<div class="marker-main" style="background:${s.color}">${s.label}</div>`
      : `<div class="marker-opt">${s.label}</div>`;
    const icon = L.divIcon({
      html: iconHtml, className: '',
      iconSize:   s.main ? [34,34] : [24,24],
      iconAnchor: s.main ? [17,17] : [12,12],
      popupAnchor: [0, s.main ? -20 : -15]
    });
    L.marker([s.lat, s.lng], { icon })
      .addTo(map)
      .bindPopup(`
        <div style="font-family:-apple-system,sans-serif;min-width:140px">
          <div style="font-weight:700;font-size:14px;color:#1e293b;margin-bottom:4px">${s.title}</div>
          <div style="font-size:12px;color:#64748b;margin-bottom:${s.regionId ? 8 : 0}px">${s.dates}</div>
          ${s.regionId ? `<a href="#${s.regionId}" onclick="document.getElementById('${s.regionId}').scrollIntoView({behavior:'smooth'});return false;" style="display:inline-block;font-size:12px;font-weight:600;color:#1d4ed8;text-decoration:none">View section ↓</a>` : ''}
        </div>`);
  });

  // ── NAV ACTIVE STATE ──
  const sections = ['today','map-section','trip-map','nj','adirondacks','lake-george','finger-lakes','hudson','logistics'];
  const navLinks = document.querySelectorAll('nav a');
  const observer = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        navLinks.forEach(a => a.classList.remove('active'));
        const link = document.querySelector(`nav a[href="#${e.target.id}"]`);
        if (link) link.classList.add('active');
      }
    });
  }, { threshold: 0.3 });
  sections.forEach(id => {
    const el = document.getElementById(id);
    if (el) observer.observe(el);
  });

}); // end window load
</script>
</body>
</html>
